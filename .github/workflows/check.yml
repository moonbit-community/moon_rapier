name: Check and Test

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: moon-rapier-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Post install
        run: |
          moon version --all
          moon update

      - name: Lint generated interfaces and formatting
        run: |
          moon info
          moon fmt
          git diff --exit-code

      - name: Moon check
        run: |
          moon check

      - name: Moon test
        run: |
          moon test --frozen

      - name: Moon build (release)
        run: |
          moon build --release

  parity-gate:
    name: Pub parity gate (2D + 3D)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Post install
        run: |
          moon version --all
          moon update

      - name: Run parity gate
        run: |
          tools/run_pub_parity_gate.sh
